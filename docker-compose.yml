services:

  postgres:
    image: postgres:16.1
    container_name: eventbooking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: eventbooking-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  booking-migrations:
    image: eventbooking-migrations:1.0
    container_name: eventbooking-booking-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=bookingService;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    command:
      - dotnet
      - ef
      - database
      - update
      - --project
      - BookingService/Infrastructure
      - --startup-project
      - BookingService/Presentation

  payment-migrations:
    image: eventbooking-migrations:1.0
    container_name: eventbooking-payment-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=paymentService;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    command:
      - dotnet
      - ef
      - database
      - update
      - --project
      - PaymentService/Infrastructure
      - --startup-project
      - PaymentService/Presentation

volumes:
  postgres-data:
  redis-data: