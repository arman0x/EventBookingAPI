services:

  postgres:
    image: postgres:16.1
    container_name: eventbooking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: eventbooking-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  booking-migrations:
    image: eventbooking-migrations:1.0
    container_name: eventbooking-booking-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=bookingService;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    command:
      - dotnet
      - ef
      - database
      - update
      - --project
      - BookingService/Infrastructure
      - --startup-project
      - BookingService/Presentation

  payment-migrations:
    image: eventbooking-migrations:1.0
    container_name: eventbooking-payment-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=paymentService;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    command:
      - dotnet
      - ef
      - database
      - update
      - --project
      - PaymentService/Infrastructure
      - --startup-project
      - PaymentService/Presentation

  booking-service:
    build:
      context: .
      dockerfile: BookingService/Dockerfile
    image: booking-service:1.0
    container_name: eventbooking-booking-service
    restart: unless-stopped
    depends_on:
      booking-migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=bookingService;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Jwt__SecretKey: ${JWT_SECRET}
      InternalAuth__Secret: ${INTERNAL_SECRET}
    ports:
      - "5001:8080"

  payment-service:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    image: payment-service:1.0
    container_name: eventbooking-payment-service
    restart: unless-stopped
    depends_on:
      payment-migrations:
        condition: service_completed_successfully
      booking-service:
        condition: service_started
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=paymentService;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__SecretKey: ${JWT_SECRET}
      BookingService__BaseUrl: "http://booking-service:8080"
      BookingService__InternalSecret: ${INTERNAL_SECRET}
    ports:
      - "5079:8080"

volumes:
  postgres-data:
  redis-data: